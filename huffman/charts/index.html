<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Huffman Coding Charts</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #f4f4f4; }
    h1 { margin-bottom: 0.5rem; }
    section { margin-bottom: 2rem; background: #ffffff; padding: 1rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,.08); }
    table { border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 8px 16px; text-align: right; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Huffman Coding Timing Analysis</h1>
  <section>
    <h2>Timing Graph</h2>
    <object type="image/svg+xml" data="huffman_timing.svg" width="900" height="500"></object>
    <p><a href="huffman_timing.svg" target="_blank">Open chart in new tab</a></p>
  </section>
  <section>
    <h2>Data Table</h2>
    <table>
      <tr><th>n (symbols)</th><th>Time (seconds)</th></tr>
      <tr><td>10</td><td>0.000013</td></tr>
      <tr><td>50</td><td>0.000019</td></tr>
      <tr><td>100</td><td>0.000019</td></tr>
      <tr><td>500</td><td>0.000056</td></tr>
      <tr><td>1000</td><td>0.000108</td></tr>
      <tr><td>5000</td><td>0.000751</td></tr>
      <tr><td>10000</td><td>0.001597</td></tr>
    </table>
  </section>
</body>
</html>
